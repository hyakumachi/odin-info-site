<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact &mdash; Daigo Umehara</title>
    <link
      rel="icon"
      href="https://i.namu.wiki/i/erunF8_F8vSYuYw_d6ouoDnFtFhUf-IT7p4RaKCTzKtC3t8mg4SIoASXGHl133jMuPhDmMingkl762g1WuGlOKfa3RTSrHwWfBhpJiHG8PBYHmWwW0ryYgAZ9FczFGlr1sjOfsCNr4RH_YUecVS1Dg.webp"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        overflow-y: scroll;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav
      class="border-b border-zinc-800 px-8 py-5 flex items-center justify-center gap-8 font-bold text-lg"
    >
      <a href="/" class="text-zinc-100">Home</a>
      <a href="/about" class="hover:text-red-500 transition-colors">About</a>
      <a href="/contact-me" class="hover:text-red-500 transition-colors"
        >Contact</a
      >
    </nav>

    <main class="flex-1 max-w-3xl mx-auto w-full px-8">
      <!-- Header -->
      <section class="pt-20 pb-14 max-w-lg mx-auto">
        <p class="text-red-600 text-xs tracking-widest uppercase mb-4">
          Contact
        </p>
        <h1 class="text-5xl font-bold mb-4">Get in touch</h1>
        <p class="text-zinc-400">
          Have a correction, suggestion, or just want to talk about Street
          Fighter?
        </p>
      </section>

      <!-- Form -->
      <section class="pb-20">
        <form class="space-y-6 max-w-lg mx-auto" action="#" method="POST">
          <div>
            <label for="name" class="block text-sm text-zinc-400 mb-2"
              >Name</label
            >
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your name"
              class="w-full bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-600 px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-colors"
            />
          </div>

          <div>
            <label for="email" class="block text-sm text-zinc-400 mb-2"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              class="w-full bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-600 px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-colors"
            />
          </div>

          <div>
            <label for="message" class="block text-sm text-zinc-400 mb-2"
              >Message</label
            >
            <textarea
              id="message"
              name="message"
              rows="5"
              placeholder="What's on your mind?"
              class="w-full bg-zinc-900 border border-zinc-700 text-zinc-100 placeholder-zinc-600 px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-colors resize-none"
            ></textarea>
          </div>

          <a
            href="https://www.youtube.com/watch?v=JzS96auqau0"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-block bg-red-600 hover:bg-red-500 text-zinc-100 px-8 py-3 text-sm font-medium tracking-wide transition-colors"
          >
            Send
          </a>
        </form>
      </section>
    </main>

    <!-- Footer -->
    <footer
      class="border-t border-zinc-800 px-8 py-5 text-center text-zinc-600 text-xs"
    >
      Fan-made info site &mdash; Not affiliated with Daigo Umehara
    </footer>
  </body>
</html>
